<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero de Equipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --border: #E2E0D8;
  --border-light: #EDECEA;
  --text-primary: #1C1B18;
  --text-secondary: #6B6960;
  --text-tertiary: #A8A69E;
  --accent: #2C2C2A;
  --green-bg: #EAF3DE; --green-fg: #27500A;
  --amber-bg: #FAEEDA; --amber-fg: #633806;
  --red-bg: #FCEBEB;   --red-fg: #A32D2D;
  --blue-bg: #E6F1FB;  --blue-fg: #0C447C;
  --purple-bg: #EEEDFE;--purple-fg: #3C3489;
  --teal-bg: #E1F5EE;  --teal-fg: #085041;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);font-size:14px;min-height:100vh;}
input,select,button{font-family:var(--font);}
/* ── LAYOUT ── */
.shell{max-width:1200px;margin:0 auto;padding:0 20px 40px;}
.header{padding:20px 0 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:0;}
.logo{font-size:15px;font-weight:600;color:var(--text-primary);letter-spacing:-0.02em;display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
.save-status{font-size:11px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px;}
/* ── NAV ── */
.nav{display:flex;gap:0;border-bottom:1px solid var(--border);margin:20px 0 24px;padding-bottom:0;}
.nav-btn{background:none;border:none;padding:10px 18px;cursor:pointer;font-size:13px;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:var(--font);font-weight:500;display:flex;align-items:center;gap:6px;transition:color 0.15s;}
.nav-btn.active{color:var(--text-primary);border-bottom-color:var(--text-primary);}
.nav-btn:hover:not(.active){color:var(--text-primary);}
.view{display:none;}.view.active{display:block;}
/* ── CARDS / SURFACES ── */
.surface{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
/* ── TOP BAR ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.page-title{font-size:15px;font-weight:600;color:var(--text-primary);}
.btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;color:var(--text-primary);font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px;font-family:var(--font);transition:background 0.12s,border-color 0.12s;}
.btn:hover{background:var(--surface);border-color:var(--text-secondary);}
.btn-primary{background:var(--text-primary);color:var(--bg);border-color:var(--text-primary);}
.btn-primary:hover{background:#333330;border-color:#333330;}
/* ── SUMMARY CARDS ── */
.sum-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);}
.sum-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;font-weight:500;letter-spacing:0.02em;text-transform:uppercase;}
.sum-val{font-size:24px;font-weight:600;color:var(--text-primary);letter-spacing:-0.02em;}
/* ── WEEK NAV ── */
.week-nav{display:flex;align-items:center;gap:8px;}
.week-nav button{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);width:30px;height:30px;cursor:pointer;color:var(--text-primary);font-size:14px;display:flex;align-items:center;justify-content:center;}
.week-nav button:hover{background:var(--bg);}
.week-label{font-size:13px;font-weight:500;min-width:180px;text-align:center;color:var(--text-primary);}
/* ── CALENDAR TABLE ── */
.grid-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
th{font-weight:600;font-size:11px;color:var(--text-secondary);padding:10px 8px;text-align:center;border-bottom:1px solid var(--border);background:var(--bg);letter-spacing:0.03em;text-transform:uppercase;}
th.col-p{text-align:left;width:130px;}th.col-o{width:90px;}
td{padding:6px 6px;border-bottom:1px solid var(--border-light);vertical-align:top;}
tr:last-child td{border-bottom:none;}
.person-cell{vertical-align:middle;}
.p-row{display:flex;align-items:center;gap:8px;}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;font-family:var(--mono);}
.p-name{font-size:12px;font-weight:600;color:var(--text-primary);}
.p-role{font-size:10px;color:var(--text-secondary);}
.day-cell{cursor:pointer;min-height:48px;border-radius:var(--radius-sm);padding:4px;transition:background 0.1s;}
.day-cell:hover{background:var(--bg);}
.day-cell.warn{background:#FFFBEB;outline:1px solid #F0C040;}
.day-cell.danger{background:#FEF2F2;outline:1px solid #FCA5A5;}
.pill{display:flex;align-items:center;gap:3px;padding:3px 6px;border-radius:4px;margin-bottom:2px;font-size:10px;line-height:1.3;font-weight:500;}
.pill-h{flex-shrink:0;font-family:var(--mono);}
.pill-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.pill-icons{display:flex;align-items:center;gap:2px;margin-left:2px;flex-shrink:0;}
.pill-link{opacity:0;cursor:pointer;font-size:10px;text-decoration:none;line-height:1;color:inherit;transition:opacity 0.1s;}
.pill:hover .pill-link{opacity:0.7;}
.pill:hover .pill-link:hover{opacity:1;}
.pill-del{opacity:0;cursor:pointer;font-size:12px;color:inherit;background:none;border:none;padding:0;line-height:1;font-family:var(--font);}
.pill:hover .pill-del{opacity:1;}
.add-link{font-size:10px;color:var(--text-tertiary);display:flex;align-items:center;gap:2px;padding:2px 2px;cursor:pointer;}
.add-link:hover{color:var(--text-secondary);}
.hour-alert{font-size:10px;padding:2px 5px;border-radius:3px;margin-top:2px;display:inline-flex;align-items:center;gap:3px;font-weight:500;}
.hour-alert.warn{background:#FEF3C7;color:#92400E;}
.hour-alert.danger{background:#FEE2E2;color:#991B1B;}
.hour-ok{font-size:10px;color:var(--green-fg);padding:2px 2px;font-weight:500;}
.day-dh{font-size:10px;color:var(--text-tertiary);display:block;text-align:center;font-weight:400;text-transform:none;letter-spacing:0;}
.occ-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding:4px 2px;}
.occ-bar-bg{width:60px;height:5px;background:var(--border);border-radius:99px;overflow:hidden;}
.occ-fill{height:100%;border-radius:99px;transition:width 0.3s;}
.occ-pct{font-size:12px;font-weight:600;font-family:var(--mono);}
.occ-sub{font-size:10px;color:var(--text-tertiary);font-family:var(--mono);}
/* ── LEGEND ── */
.legend-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:14px;align-items:center;}
.leg-pill{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500;}
.leg-note{font-size:10px;color:var(--text-tertiary);margin-left:4px;display:flex;align-items:center;gap:3px;}
/* ── PROJECTS ── */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-top:4px;}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.proj-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px;}
.proj-name{font-size:14px;font-weight:600;color:var(--text-primary);letter-spacing:-0.01em;}
.proj-code{font-size:10px;color:var(--text-secondary);font-family:var(--mono);background:var(--bg);padding:2px 7px;border-radius:4px;border:1px solid var(--border-light);letter-spacing:0.05em;}
.proj-links{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
.proj-link{font-size:10px;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;text-decoration:none;border:1px solid var(--border);color:var(--text-secondary);font-weight:500;transition:all 0.12s;}
.proj-link:hover{border-color:var(--text-secondary);color:var(--text-primary);}
.proj-link.bc:hover{border-color:#EF9F27;color:#EF9F27;}
.proj-link.gen:hover{border-color:#378ADD;color:#378ADD;}
.proj-link-ghost{font-size:10px;color:var(--text-tertiary);background:none;border:1px dashed var(--border);border-radius:20px;padding:2px 8px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;font-family:var(--font);}
.proj-link-ghost:hover{border-color:var(--text-secondary);color:var(--text-secondary);}
.status-badge{font-size:10px;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;font-weight:600;}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.prog-bar{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width 0.3s;}
.prog-pct{font-size:12px;font-weight:600;min-width:36px;text-align:right;font-family:var(--mono);}
.deliverables{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.del-ctrl{display:flex;align-items:center;gap:3px;}
.del-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text-primary);line-height:1;transition:background 0.1s;}
.del-btn:hover{background:var(--bg);}
.del-count{font-size:12px;font-weight:600;min-width:46px;text-align:center;font-family:var(--mono);}
.del-label{font-size:11px;color:var(--text-secondary);}
.quota-sec{border-top:1px solid var(--border-light);padding-top:10px;margin:6px 0 10px;}
.quota-title{font-size:10px;font-weight:600;color:var(--text-secondary);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.05em;}
.quota-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.quota-role{font-size:11px;color:var(--text-secondary);width:86px;flex-shrink:0;}
.quota-bar-wrap{flex:1;display:flex;align-items:center;gap:6px;}
.quota-bar{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.quota-fill{height:100%;border-radius:99px;}
.quota-nums{font-size:10px;font-family:var(--mono);white-space:nowrap;font-weight:500;}
.proj-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border-light);padding-top:8px;margin-top:6px;}
.ghost-btn{font-size:11px;color:var(--text-tertiary);background:none;border:none;cursor:pointer;padding:2px 4px;display:inline-flex;align-items:center;gap:3px;font-family:var(--font);transition:color 0.1s;}
.ghost-btn:hover{color:var(--red-fg);}
.ghost-btn.edit:hover{color:var(--text-primary);}
.deadline-label{font-size:10px;font-weight:500;}
.add-card{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;min-height:120px;transition:border-color 0.12s,background 0.12s;}
.add-card:hover{background:var(--bg);border-color:var(--text-secondary);}
.add-card span{font-size:12px;color:var(--text-secondary);font-weight:500;}
/* ── PEOPLE ── */
.people-section{margin-bottom:16px;}
.people-section-label{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:10px;}
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
.people-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.p-info{flex:1;}
.p-info-name{font-size:13px;font-weight:600;}
.p-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.p-role-tag{font-size:10px;color:var(--text-secondary);}
.link-badge{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:600;}
.p-occ-row{margin-top:6px;display:flex;align-items:center;gap:6px;}
.people-del{background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:18px;padding:2px;line-height:1;transition:color 0.1s;}
.people-del:hover{color:var(--red-fg);}
.add-people-row{margin-top:10px;}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;width:340px;max-width:95%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,0.12);}
.modal h3{font-size:15px;font-weight:600;margin-bottom:4px;letter-spacing:-0.01em;}
.modal-sub{font-size:11px;color:var(--text-secondary);margin-bottom:14px;}
.field{margin-bottom:10px;}
.field label{font-size:11px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em;}
.field input,.field select{width:100%;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;background:var(--bg);color:var(--text-primary);font-family:var(--font);outline:none;transition:border-color 0.12s;}
.field input:focus,.field select:focus{border-color:var(--text-primary);}
.field input.mono{font-family:var(--mono);letter-spacing:0.05em;}
.sec-div{font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin:14px 0 8px;padding-top:10px;border-top:1px solid var(--border-light);}
.qi-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.qi-row label{margin:0;width:90px;flex-shrink:0;font-size:11px;color:var(--text-secondary);}
.qi-row input{flex:1;font-size:12px;font-family:var(--mono);}
.qi-row span{font-size:11px;color:var(--text-tertiary);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.err{font-size:11px;color:var(--red-fg);margin-top:4px;font-weight:500;}
.over-note{font-size:11px;color:#92400E;background:#FEF3C7;padding:5px 8px;border-radius:4px;margin-top:4px;display:none;}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="logo"><div class="logo-dot"></div>Tablero de Equipo</div>
    <div class="save-status" id="save-status"><i class="ti ti-check"></i> Datos guardados</div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('cal')"><i class="ti ti-calendar-week"></i> Semana</button>
    <button class="nav-btn" onclick="switchTab('proj')"><i class="ti ti-chart-bar"></i> Proyectos</button>
    <button class="nav-btn" onclick="switchTab('people')"><i class="ti ti-users"></i> Equipo</button>
  </div>
  <div id="view-cal" class="view active"></div>
  <div id="view-proj" class="view"></div>
  <div id="view-people" class="view"></div>
</div>

<script>
const DAYS=['Lun','Mar','Mi\u00e9','Jue','Vie'];
const TASK_TYPES=[
  {id:'ejecucion',   label:'Ejecuci\u00f3n',      bg:'#E6F1FB',fg:'#0C447C'},
  {id:'reunion',     label:'Reuni\u00f3n',          bg:'#FAEEDA',fg:'#633806'},
  {id:'igloo',       label:'Reuni\u00f3n Igloo',   bg:'#F1EAF8',fg:'#5B2D8E'},
  {id:'cliente',     label:'Cliente',          bg:'#FAECE7',fg:'#712B13'},
  {id:'revision',    label:'Revisi\u00f3n',        bg:'#FBEAF0',fg:'#72243E'},
  {id:'entrega',     label:'Entrega',          bg:'#E1F5EE',fg:'#085041'},
  {id:'capacitacion',label:'Capacitaci\u00f3n',    bg:'#FEF3E2',fg:'#7A4100'},
  {id:'admin',       label:'Administrativo',  bg:'#F1EFE8',fg:'#444441'},
  {id:'permiso',     label:'Permiso',          bg:'#FDE8F0',fg:'#8C1A4B'},
  {id:'vacaciones',  label:'Vacaciones',       bg:'#EAF3DE',fg:'#27500A'},
  {id:'libre',       label:'Libre',            bg:'#EFEFEF',fg:'#666663'},
];
const TM=Object.fromEntries(TASK_TYPES.map(t=>[t.id,t]));
const NO_PROJ=['vacaciones','permiso','libre','admin','capacitacion','igloo','reunion'];
const ROLES=['Manager','Copy','Dise\u00f1o','Motion','Industrial','Estrategia','Otro'];
const ROLE_FG=['#444441','#0C447C','#3C3489','#085041','#633806','#712B13','#72243E'];
const ROLE_BG=['#F1EFE8','#E6F1FB','#EEEDFE','#E1F5EE','#FAEEDA','#FAECE7','#FBEAF0'];
const LINK_TYPES=[
  {id:'fijo',   label:'Fijo',              bg:'#E1F5EE',fg:'#085041'},
  {id:'apoyo',  label:'Apoyo puntual',     bg:'#FAEEDA',fg:'#633806'},
  {id:'externo',label:'Externo/Freelance', bg:'#EEEDFE',fg:'#3C3489'},
];
const LM=Object.fromEntries(LINK_TYPES.map(l=>[l.id,l]));
const AVC=[['#EEEDFE','#3C3489'],['#E6F1FB','#0C447C'],['#E1F5EE','#085041'],['#FAEEDA','#633806'],['#FBEAF0','#72243E'],['#FAECE7','#712B13'],['#F1EAF8','#5B2D8E']];

const DEFAULT_STATE={
  weekOffset:0,
  people:[
    {id:'p1',name:'Ana Garc\u00eda',role:'Copy',link:'fijo'},
    {id:'p2',name:'Luis Mora',role:'Dise\u00f1o',link:'fijo'},
  ],
  projects:[
    {id:'pr1',name:'Bancolombia',done:3,total:8,deadline:'2026-06-15',basecampUrl:'',projectUrl:'',code:'BC2026001',quota:{Manager:5,Copy:20,"Dise\u00f1o":30,Motion:0,Industrial:0,Estrategia:0,Otro:0}},
    {id:'pr2',name:\u00c9xito',done:1,total:5,deadline:'2026-05-30',basecampUrl:'',projectUrl:'',code:'EX2026002',quota:{Manager:4,Copy:10,"Dise\u00f1o":15,Motion:8,Industrial:0,Estrategia:0,Otro:5}},
    {id:'pr3',name:'Postob\u00f3n',done:5,total:6,deadline:'2026-06-30',basecampUrl:'',projectUrl:'',code:'PB2026003',quota:{Manager:3,Copy:8,"Dise\u00f1o":24,Motion:12,Industrial:0,Estrategia:6,Otro:0}},
  ],
  entries:{},
};

function loadState(){
  try{
    const saved=localStorage.getItem('teamboard_v1');
    if(saved){const p=JSON.parse(saved);p.modal=null;return p;}
  }catch(e){}
  return Object.assign({},DEFAULT_STATE,{modal:null});
}
function saveState(){
  try{
    const toSave=Object.assign({},S);delete toSave.modal;
    localStorage.setItem('teamboard_v1',JSON.stringify(toSave));
    showSaved();
  }catch(e){}
}
function showSaved(){
  const el=document.getElementById('save-status');
  if(!el)return;
  el.innerHTML='<i class="ti ti-check"></i> Guardado';
  el.style.color='#27500A';
  setTimeout(()=>{el.innerHTML='<i class="ti ti-clock"></i> Auto-guardado activo';el.style.color='';},2000);
}

let S=loadState();

function uid(){return 'x'+Math.random().toString(36).slice(2);}
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function avStyle(i){const[bg,fg]=AVC[i%AVC.length];return \`background:\${bg};color:\${fg}\`;}
function occColor(p){return p>=90?'#DC2626':p>=70?'#D97706':'#16A34A';}
function progColor(p){return p>=80?'#16A34A':p>=40?'#D97706':'#2563EB';}

function getWeekDates(off){
  const now=new Date();const day=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1)+off*7);
  return Array.from({length:5},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function weekLabel(off){
  const dd=getWeekDates(off);
  const fmt=d=>d.toLocaleDateString('es-CO',{day:'numeric',month:'short'});
  return \`\${fmt(dd[0])} \u2013 \${fmt(dd[4])}\`;
}
function eKey(pid,wo,di){return \`\${pid}_w\${wo}_d\${di}\`;}
function getE(pid,di){return S.entries[eKey(pid,S.weekOffset,di)]||[];}
function setE(pid,di,arr){S.entries[eKey(pid,S.weekOffset,di)]=arr;saveState();}
function hoursDay(pid,di){return getE(pid,di).reduce((s,e)=>s+e.hours,0);}
function hoursWeek(pid){return DAYS.reduce((s,_,i)=>s+hoursDay(pid,i),0);}
function weekOcc(pid){return Math.round((hoursWeek(pid)/40)*100);}
function daysLeft(dl){if(!dl)return null;return Math.ceil((new Date(dl+'T12:00:00')-new Date())/(1000*60*60*24));}
function deadlineLabel(dl){
  if(dl===null)return '';
  if(dl<0)return \`<span class="deadline-label" style="color:#DC2626">\u26a0 Vencido hace \${Math.abs(dl)}d</span>\`;
  if(dl===0)return \`<span class="deadline-label" style="color:#DC2626">Vence hoy</span>\`;
  if(dl<=7)return \`<span class="deadline-label" style="color:#D97706">Vence en \${dl}d</span>\`;
  return \`<span class="deadline-label" style="color:var(--text-tertiary)">Vence en \${dl}d</span>\`;
}
function makeOverlay(){const o=document.createElement('div');o.className='modal-overlay';return o;}

function switchTab(t){
  S.tab=t;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['cal','proj','people'][i]===t));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+t).classList.add('active');
  renderTab(t);
}
function renderTab(t){({cal:renderCal,proj:renderProj,people:renderPeople})[t]();}

function renderCal(){
  const el=document.getElementById('view-cal');
  const dates=getWeekDates(S.weekOffset);
  const pp=S.people;
  const totalH=pp.length*40;
  const usedH=pp.reduce((s,p)=>s+hoursWeek(p.id),0);
  const gOcc=totalH>0?Math.round((usedH/totalH)*100):0;
  const over=pp.filter(p=>weekOcc(p.id)>=90).length;
  const free=pp.filter(p=>weekOcc(p.id)<70).length;

  let h=\`<div class="top-bar">
    <div class="week-nav">
      <button onclick="chW(-1)">&#8592;</button>
      <span class="week-label">\${weekLabel(S.weekOffset)}</span>
      <button onclick="chW(1)">&#8594;</button>
    </div>
  </div>
  <div class="sum-row">
    <div class="sum-card"><div class="sum-label">Personas</div><div class="sum-val">\${pp.length}</div></div>
    <div class="sum-card"><div class="sum-label">Ocupaci\u00f3n</div><div class="sum-val" style="color:\${occColor(gOcc)}">\${gOcc}%</div></div>
    <div class="sum-card"><div class="sum-label">Con capacidad</div><div class="sum-val" style="color:#16A34A">\${free}</div></div>
    <div class="sum-card"><div class="sum-label">Sobrecargados</div><div class="sum-val" style="color:\${over>0?'#DC2626':'var(--text-secondary)'}">\${over}</div></div>
  </div>
  <div class="grid-wrap"><table>
    <thead><tr>
      <th class="col-p">Persona</th>
      \${DAYS.map((d,i)=>\`<th>\${d}<span class="day-dh">\${dates[i].getDate()}/\${dates[i].getMonth()+1}</span></th>\`).join('')}
      <th class="col-o">Semana</th>
    </tr></thead><tbody>\`;

  for(let pi=0;pi<pp.length;pi++){
    const p=pp[pi];
    h+=\`<tr><td class="person-cell">
      <div class="p-row">
        <div class="avatar" style="\${avStyle(pi)}">\${initials(p.name)}</div>
        <div>
          <div class="p-name">\${p.name}</div>
          <div class="p-role">\${p.role}\${p.link&&p.link!=='fijo'?\` &middot; <span style="color:\${LM[p.link]?.fg};font-size:9px">\${LM[p.link]?.label}</span>':''}</div>
        </div>
      </div></td>\`;
    for(let di=0;di<5;di++){
      const entries=getE(p.id,di);
      const used=hoursDay(p.id,di);
      const isWarn=used>8&&used<=10;const isDanger=used>10;
      const cellCls=isDanger?' danger':isWarn?' warn':'';
      h+=\`<td><div class="day-cell\${cellCls}" onclick="openEntryModal('\${p.id}',\${di})">\`;
      entries.forEach((e,ei)=>{
        const t=TM[e.type]||{bg:'#F1EFE8',fg:'#444441'};
        const showT=e.project&&!NO_PROJ.includes(e.type);
        h+=\`<div class="pill" style="background:\${t.bg}">
          <span class="pill-h" style="color:\${t.fg}">\${e.hours}h</span>
          <span class="pill-name" style="color:\${t.fg}">\${NO_PROJ.includes(e.type)?t.label:e.project||t.label}</span>
          <span class="pill-icons">
            \${showT?\`<a class="pill-link" \${e.trelloUrl?\`href="\${e.trelloUrl}" target="_blank" onclick="event.stopPropagation()"\`:\`href="#" onclick="openSetTrello(event,'\${p.id}',\${di},\${ei})"\`} title="\${e.trelloUrl?'Ver en Trello':'Agregar enlace Trello'}" style="color:\${t.fg}"><i class="ti ti-brand-trello" style="font-size:10px"></i></a>\`:''}
            <button class="pill-del" style="color:\${t.fg}" onclick="delE(event,'\${p.id}',\${di},\${ei})">\u00d7</button>
          </span>
        </div>\`;
      });
      if(isDanger)h+=\`<div class="hour-alert danger">\u26d4 \${used}h &mdash; m\u00e1s de 10h</div>\`;
      else if(isWarn)h+=\`<div class="hour-alert warn">\u26a0 \${used}h &mdash; horas extra</div>\`;
      else if(used===8)h+=\`<div class="hour-ok">\u2713 8h completas</div>\`;
      else h+=\`<div class="add-link"><i class="ti ti-plus" style="font-size:10px"></i>\${used>0?\`\${8-used}h libres\`:'+ asignar'}</div>\`;
      h+=\`</div></td>\`;
    }
    const wp=weekOcc(p.id);
    h+=\`<td><div class="occ-wrap">
      <span class="occ-pct" style="color:\${occColor(wp)}">\${wp}%</span>
      <div class="occ-bar-bg"><div class="occ-fill" style="width:\${Math.min(wp,100)}%;background:\${occColor(wp)}"></div></div>
      <span class="occ-sub">\${hoursWeek(p.id)}/40h</span>
    </div></td></tr>\`;
  }
  h+=\`</tbody></table></div>
  <div class="legend-wrap">
    \${TASK_TYPES.map(t=>\`<span class="leg-pill" style="background:\${t.bg};color:\${t.fg}">\${t.label}</span>\`).join('')}
    <span class="leg-pill" style="background:#FEF3C7;color:#92400E">\u26a0 8\u201310h</span>
    <span class="leg-pill" style="background:#FEE2E2;color:#991B1B">\u26d4 +10h</span>
    <span class="leg-note"><i class="ti ti-brand-trello" style="font-size:10px"></i> enlace Trello al pasar el cursor</span>
  </div>\`;
  el.innerHTML=h;
  if(S.modal?.type==='entry')renderEntryModal();
  if(S.modal?.type==='trello')renderTrelloModal();
}

function renderProj(){
  const el=document.getElementById('view-proj');
  const total=S.projects.length;
  const pct=total>0?Math.round(S.projects.reduce((s,p)=>s+(p.total>0?p.done/p.total:0),0)/total*100):0;
  const onTrack=S.projects.filter(p=>{const dl=daysLeft(p.deadline);return dl===null||dl>=0;}).length;

  let h=\`<div class="top-bar">
    <span class="page-title">Proyectos activos</span>
    <button class="btn" onclick="openAddProj()"><i class="ti ti-plus"></i> Nuevo proyecto</button>
  </div>
  <div class="sum-row">
    <div class="sum-card"><div class="sum-label">Proyectos</div><div class="sum-val">\${total}</div></div>
    <div class="sum-card"><div class="sum-label">Avance promedio</div><div class="sum-val" style="color:\${progColor(pct)}">\${pct}%</div></div>
    <div class="sum-card"><div class="sum-label">A tiempo</div><div class="sum-val" style="color:#16A34A">\${onTrack}</div></div>
  </div>
  <div class="proj-grid">\`;

  S.projects.forEach(p=>{
    const ppct=p.total>0?Math.round((p.done/p.total)*100):0;
    const dl=daysLeft(p.deadline);
    const dlFmt=p.deadline?new Date(p.deadline+'T12:00:00').toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric'}):'';
    const stBg=ppct>=100?'#EAF3DE':dl!==null&&dl<0?'#FCEBEB':dl!==null&&dl<=7?'#FAEEDA':'#E6F1FB';
    const stFg=ppct>=100?'#27500A':dl!==null&&dl<0?'#A32D2D':dl!==null&&dl<=7?'#633806':'#0C447C';
    const stTxt=ppct>=100?'Completado':dl!==null&&dl<0?'Vencido':dl!==null&&dl<=7?'Urgente':'En curso';
    const totalQ=ROLES.reduce((s,r)=>s+(p.quota[r]||0),0);

    h+=\`<div class="proj-card">
      <div class="proj-header">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px">
            <span class="proj-name">\${p.name}</span>
            \${p.code?\`<span class="proj-code">\${p.code}</span>\`:''}
          </div>
          <div class="proj-links">
            \${p.basecampUrl
              ?\`<a class="proj-link bc" href="\${p.basecampUrl}" target="_blank"><i class="ti ti-brand-basecamp"></i> Basecamp</a>\`
              :\`<button class="proj-link-ghost" onclick="openEditProj('\${p.id}')"><i class="ti ti-plus"></i> Basecamp</button>\`}
            \${p.projectUrl
              ?\`<a class="proj-link gen" href="\${p.projectUrl}" target="_blank"><i class="ti ti-external-link"></i> Enlace</a>\`
              :\`<button class="proj-link-ghost" onclick="openEditProj('\${p.id}')"><i class="ti ti-plus"></i> Enlace</button>\`}
            \${dlFmt?\`<span style="font-size:10px;color:var(--text-secondary)"><i class="ti ti-calendar" style="font-size:10px"></i> \${dlFmt}</span>\`:''}
          </div>
        </div>
        <span class="status-badge" style="background:\${stBg};color:\${stFg}">\${stTxt}</span>
      </div>
      <div class="prog-row">
        <div class="prog-bar"><div class="prog-fill" style="width:\${ppct}%;background:\${progColor(ppct)}"></div></div>
        <span class="prog-pct" style="color:\${progColor(ppct)}">\${ppct}%</span>
      </div>
      <div class="deliverables">
        <span class="del-label">Entregables:</span>
        <div class="del-ctrl">
          <button class="del-btn" onclick="chD('\${p.id}',-1,'done')">&#8722;</button>
          <span class="del-count">\${p.done}/\${p.total}</span>
          <button class="del-btn" onclick="chD('\${p.id}',1,'done')">+</button>
        </div>
        <span class="del-label">hechos &middot; Total:</span>
        <div class="del-ctrl">
          <button class="del-btn" onclick="chD('\${p.id}',-1,'total')">&#8722;</button>
          <span class="del-count" style="min-width:26px">\${p.total}</span>
          <button class="del-btn" onclick="chD('\${p.id}',1,'total')">+</button>
        </div>
      </div>
      \${totalQ>0?\`<div class="quota-sec">
        <div class="quota-title">Horas cotizadas por rol</div>
        \${ROLES.filter(r=>(p.quota[r]||0)>0).map(r=>{
          const q=p.quota[r]||0;const fi=ROLES.indexOf(r);
          return \`<div class="quota-row">
            <span class="quota-role">\${r}</span>
            <div class="quota-bar-wrap">
              <div class="quota-bar"><div class="quota-fill" style="width:100%;background:\${ROLE_BG[fi]}"></div></div>
              <span class="quota-nums" style="color:\${ROLE_FG[fi]}">\${q}h</span>
            </div>
          </div>\`;
        }).join('')}
      </div>\`:''}
      <div class="proj-footer">
        \${deadlineLabel(dl)}
        <div style="display:flex;gap:4px">
          <button class="ghost-btn edit" onclick="openEditProj('\${p.id}')"><i class="ti ti-edit" style="font-size:11px"></i> Editar</button>
          <button class="ghost-btn" onclick="deleteProj('\${p.id}')"><i class="ti ti-trash" style="font-size:11px"></i> Eliminar</button>
        </div>
      </div>
    </div>\`;
  });

  h+=\`<div class="add-card" onclick="openAddProj()">
    <i class="ti ti-plus" style="font-size:22px;color:var(--text-tertiary)"></i>
    <span>Nuevo proyecto</span>
  </div></div>\`;
  el.innerHTML=h;
  if(S.modal?.type==='addProj'||S.modal?.type==='editProj')renderProjModal();
}

function renderPeople(){
  const el=document.getElementById('view-people');
  let h=\`<div class="top-bar">
    <span class="page-title">Equipo y talento</span>
    <button class="btn" onclick="openAddPerson()"><i class="ti ti-user-plus"></i> Agregar persona</button>
  </div>\`;
  LINK_TYPES.forEach(lt=>{
    const group=S.people.filter(p=>p.link===lt.id);
    if(!group.length)return;
    h+=\`<div class="people-section">
      <div class="people-section-label" style="background:\${lt.bg};color:\${lt.fg}">\${lt.label}</div>
      <div class="people-grid">\`;
    group.forEach(p=>{
      const pi=S.people.indexOf(p);const wp=weekOcc(p.id);
      h+=\`<div class="people-card">
        <div class="avatar" style="\${avStyle(pi)};width:36px;height:36px;font-size:12px">\${initials(p.name)}</div>
        <div class="p-info">
          <div class="p-info-name">\${p.name}</div>
          <div class="p-meta">
            <span class="p-role-tag">\${p.role}</span>
            <span class="link-badge" style="background:\${lt.bg};color:\${lt.fg}">\${lt.label}</span>
          </div>
          <div class="p-occ-row">
            <div class="occ-bar-bg" style="width:70px"><div class="occ-fill" style="width:\${Math.min(wp,100)}%;background:\${occColor(wp)}"></div></div>
            <span style="font-size:11px;font-weight:600;color:\${occColor(wp)};font-family:var(--mono)">\${wp}%</span>
          </div>
        </div>
        <button class="people-del" onclick="deletePerson('\${p.id}')">&times;</button>
      </div>\`;
    });
    h+=\`</div></div>\`;
  });
  h+=\`<div class="add-people-row"><div class="add-card" style="min-height:56px;flex-direction:row;gap:8px" onclick="openAddPerson()">
    <i class="ti ti-user-plus" style="font-size:16px;color:var(--text-tertiary)"></i>
    <span>Agregar persona al equipo</span>
  </div></div>\`;
  el.innerHTML=h;
  if(S.modal?.type==='addPerson')renderAddPersonModal();
}

function renderEntryModal(){
  const{pid,dayIdx}=S.modal;
  const p=S.people.find(x=>x.id===pid);
  const dates=getWeekDates(S.weekOffset);
  const d=dates[dayIdx];
  const used=hoursDay(pid,dayIdx);
  const ov=makeOverlay();
  ov.innerHTML=\`<div class="modal">
    <h3>\${p.name} \u2014 \${DAYS[dayIdx]} \${d.getDate()}/\${d.getMonth()+1}</h3>
    <div class="modal-sub">\${used}h asignadas\${used>=8?\` &middot; <span style="color:\${used>10?'#DC2626':'#D97706'}">\${used>10?'m\u00e1s de 10h':'supera la jornada'}</span>':\` &middot; quedan \${8-used}h\`}</div>
    <div class="field"><label>Tipo de tarea</label>
      <select id="m-type" onchange="toggleProjField(this.value)">\${TASK_TYPES.map(t=>\`<option value="\${t.id}">\${t.label}</option>\`).join('')}</select>
    </div>
    <div id="proj-field" class="field"><label>Proyecto</label>
      <select id="m-proj"><option value="">\u2014 sin proyecto \u2014</option>\${S.projects.map(pr=>\`<option value="\${pr.name}">\${pr.name}</option>\`).join('')}</select>
    </div>
    <div class="field"><label>Horas</label>
      <input type="number" id="m-hours" min="0.5" max="16" step="0.5" value="\${Math.max(0.5,Math.min(4,8-used))||1}">
    </div>
    <div class="over-note" id="m-over-note">\u26a0 Superarás las 8h de jornada \u2014 se registrará como horas extra.</div>
    <div id="trello-field" class="field"><label><i class="ti ti-brand-trello" style="font-size:11px"></i> Enlace Trello (opcional)</label>
      <input type="url" id="m-trello" placeholder="https://trello.com/c/...">
    </div>
    <div id="m-err" class="err"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEntry()">Agregar</button>
    </div>
  </div>\`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  document.body.appendChild(ov);
  toggleProjField('ejecucion');
  setTimeout(()=>{
    const hi=document.getElementById('m-hours');
    if(hi)hi.addEventListener('input',()=>{
      const note=document.getElementById('m-over-note');
      if(note)note.style.display=(used+parseFloat(hi.value||0))>8?'block':'none';
    });
  },50);
}

function toggleProjField(val){
  const pf=document.getElementById('proj-field');
  const tf=document.getElementById('trello-field');
  if(pf)pf.style.display=NO_PROJ.includes(val)?'none':'block';
  if(tf)tf.style.display=NO_PROJ.includes(val)?'none':'block';
}

  const{pid,dayIdx,entryIdx}=S.modal;

  const ov=makeOverlay();
  ov.innerHTML=\`<div class="modal">
    <h3><i class="ti ti-brand-trello"></i> Enlace Trello</h3>
    <div class="modal-sub">Pega el enlace de la tarjeta en Trello</div>
    <div class="field"><label>URL</label>
      <input type="url" id="trl-url" placeholder="https://trello.com/c/..." value="\${entry?.trelloUrl||''}" autofocus>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveTrello()">Guardar</button>
    </div>
  </div>\`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  document.body.appendChild(ov);
}

    <div class="field"><label>Nombre</label><input type="text" id="ap-name" placeholder="ej: Bancolombia Q3" value="\${proj?.name||''}" autofocus></div>
    <div class="field"><label>C\u00f3digo <span style="font-weight:400;text-transform:none;letter-spacing:0">(m\u00e1x. 10 caracteres)</span></label><input type="text" class="mono" id="ap-code" maxlength="10" placeholder="ej: BC2026001" value="\${proj?.code||''}" ></div>
    <div class="field"><label>Total entregables</label><input type="number" id="ap-total" min="1" value="\${proj?.total||5}"></div>
    <div class="field"><label>Fecha l\u00edmite</label><input type="date" id="ap-date" value="\${proj?.deadline||''}" ></div>
    <div class="field"><label><i class="ti ti-brand-basecamp" style="font-size:11px"></i> Enlace Basecamp</label><input type="url" id="ap-bc" placeholder="https://basecamp.com/..." value="\${proj?.basecampUrl||''}" ></div>
    <div class="field"><label><i class="ti ti-external-link" style="font-size:11px"></i> Enlace adicional</label><input type="url" id="ap-url" placeholder="https://..." value="\${proj?.projectUrl||''}" ></div>
    <div class="sec-div">Horas cotizadas por rol</div>
    \${ROLES.map(r=>\`<div class="qi-row"><label>\${r}</label><input type="number" id="q-\${r}" min="0" step="1" value="\${q[r]||0}"><span>horas</span></div>\`).join('')}
    <div id="ap-err" class="err"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="\${isEdit?\`saveEditProj('\${proj.id}')\`:'saveProj()'}">\${isEdit?'Guardar':'Crear'}</button>
    </div>
  </div>\`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});

  const ov=makeOverlay();
  ov.innerHTML=\`<div class="modal">
    <h3>Agregar persona</h3>
    <div class="field"><label>Nombre completo</label><input type="text" id="pp-name" placeholder="ej: Carlos Ruiz" autofocus></div>
    <div class="field"><label>Rol</label><select id="pp-role">\${ROLES.map(r=>\`<option value="\${r}">\${r}</option>\`).join('')}</select></div>
    <div class="field"><label>Tipo de v\u00ednculo</label><select id="pp-link">\${LINK_TYPES.map(l=>\`<option value="\${l.id}">\${l.label}</option>\`).join('')}</select></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="savePerson()">Agregar</button>
    </div>
  </div>\`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  document.body.appendChild(ov);
}

function chW(d){S.weekOffset+=d;saveState();renderCal();}
function openEntryModal(pid,di){S.modal={type:'entry',pid,dayIdx:di};renderCal();}
function closeModal(){S.modal=null;document.querySelectorAll('.modal-overlay').forEach(e=>e.remove());}
function openSetTrello(evt,pid,di,ei){evt.preventDefault();evt.stopPropagation();S.modal={type:'trello',pid,dayIdx:di,entryIdx:ei};renderCal();}

function saveTrello(){
  const url=document.getElementById('trl-url').value.trim();
  const{pid,dayIdx,entryIdx}=S.modal;
  const arr=getE(pid,dayIdx);if(arr[entryIdx])arr[entryIdx].trelloUrl=url;
  setE(pid,dayIdx,arr);closeModal();renderCal();
}
function saveEntry(){
  const type=document.getElementById('m-type').value;
  const proj=NO_PROJ.includes(type)?'':(document.getElementById('m-proj')?.value||''  );
  const hours=parseFloat(document.getElementById('m-hours').value)||1;
  const trelloUrl=document.getElementById('m-trello')?.value.trim()||''  ;
  const{pid,dayIdx}=S.modal;
  const arr=getE(pid,dayIdx);
  arr.push({project:proj,type,hours,trelloUrl});
  setE(pid,dayIdx,arr);closeModal();renderCal();
}
function delE(evt,pid,di,ei){evt.stopPropagation();const arr=getE(pid,di);arr.splice(ei,1);setE(pid,di,arr);renderCal();}
function openAddProj(){S.modal={type:'addProj'};renderProj();}
function openEditProj(id){S.modal={type:'editProj',projId:id};renderProj();}
function saveProj(){
  const name=document.getElementById('ap-name').value.trim();
  if(!name){document.getElementById('ap-err').textContent='Escribe el nombre.';return;}
  const code=document.getElementById('ap-code').value.trim().slice(0,10);
  const total=parseInt(document.getElementById('ap-total').value)||1;
  const deadline=document.getElementById('ap-date').value;
  const basecampUrl=document.getElementById('ap-bc').value.trim();
  const projectUrl=document.getElementById('ap-url').value.trim();
  const quota=Object.fromEntries(ROLES.map(r=>[r,parseInt(document.getElementById('q-'+r).value)||0]));
  S.projects.push({id:uid(),name,code,done:0,total,deadline,basecampUrl,projectUrl,quota});
  saveState();closeModal();renderProj();
}
function saveEditProj(id){
  const p=S.projects.find(x=>x.id===id);if(!p)return;
  p.name=document.getElementById('ap-name').value.trim()||p.name;
  p.code=document.getElementById('ap-code').value.trim().slice(0,10);
  p.total=parseInt(document.getElementById('ap-total').value)||p.total;
  p.deadline=document.getElementById('ap-date').value;
  p.basecampUrl=document.getElementById('ap-bc').value.trim();
  p.projectUrl=document.getElementById('ap-url').value.trim();
  ROLES.forEach(r=>{p.quota[r]=parseInt(document.getElementById('q-'+r).value)||0;});
  if(p.done>p.total)p.done=p.total;
  saveState();closeModal();renderProj();
}
function deleteProj(id){S.projects=S.projects.filter(p=>p.id!==id);saveState();renderProj();}
function chD(id,delta,field){
  const p=S.projects.find(x=>x.id===id);if(!p)return;
  if(field==='done')p.done=Math.max(0,Math.min(p.total,p.done+delta));
  if(field==='total'){p.total=Math.max(1,p.total+delta);if(p.done>p.total)p.done=p.total;}
  saveState();renderProj();
}
function openAddPerson(){S.modal={type:'addPerson'};renderPeople();}
function savePerson(){
  const name=document.getElementById('pp-name').value.trim();
  const role=document.getElementById('pp-role').value;
  const link=document.getElementById('pp-link').value;
  if(!name)return;
  S.people.push({id:uid(),name,role,link});
  saveState();closeModal();renderPeople();
}
function deletePerson(id){S.people=S.people.filter(p=>p.id!==id);saveState();renderPeople();}

renderCal();
