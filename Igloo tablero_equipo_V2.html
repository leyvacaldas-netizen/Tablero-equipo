<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero de Equipo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#0f0f0e;--surface:#1a1a18;--surface2:#242420;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --t1:#f0ede8;--t2:#8a8780;--t3:#555350;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:10px;--rs:6px;
}
[data-theme="light"]{
  --bg:#F7F6F2;--surface:#FFFFFF;--surface2:#F1EFE8;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);
  --t1:#1C1B18;--t2:#6B6960;--t3:#A8A69E;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--t1);font-size:13px;min-height:100vh;}
input,select,button{font-family:var(--font);}
.shell{max-width:1200px;margin:0 auto;padding:0 20px 40px;}
.header{padding:18px 0 0;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px;color:var(--t1);}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--t1);}
.header-right{display:flex;align-items:center;gap:10px;}
.sst{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:3px;}
.theme-btn{background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--rs);padding:5px 10px;cursor:pointer;color:var(--t2);font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:5px;}
.theme-btn:hover{color:var(--t1);border-color:var(--t1);}
.nav{display:flex;border-bottom:0.5px solid var(--border2);margin:14px 0 18px;}
.nb{background:none;border:none;padding:8px 16px;cursor:pointer;font-size:12px;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-0.5px;font-weight:500;display:flex;align-items:center;gap:5px;}
.nb.active{color:var(--t1);border-bottom-color:var(--t1);}
.nb:hover:not(.active){color:var(--t1);}
.view{display:none;}.view.active{display:block;}
.tbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.ptitle{font-size:14px;font-weight:500;color:var(--t1);}
.btn{background:none;border:0.5px solid var(--border2);border-radius:var(--rs);padding:5px 12px;cursor:pointer;color:var(--t1);font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.btn:hover{background:var(--surface2);}
.btn-ok{background:var(--t1);color:var(--bg);border-color:var(--t1);}
.btn-ok:hover{opacity:.85;}
.srow{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:16px;}
.sc{background:var(--surface2);border-radius:var(--rs);padding:12px 14px;}
.slbl{font-size:10px;color:var(--t2);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;}
.sval{font-size:22px;font-weight:500;color:var(--t1);}
.wnav{display:flex;align-items:center;gap:6px;}
.wnav button{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--rs);width:28px;height:28px;cursor:pointer;color:var(--t1);font-size:13px;display:flex;align-items:center;justify-content:center;}
.wnav button:hover{background:var(--surface);}
.wlbl{font-size:12px;font-weight:500;min-width:170px;text-align:center;color:var(--t1);}
.gwrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r);overflow:hidden;}
th{font-weight:500;font-size:10px;color:var(--t2);padding:9px 7px;text-align:center;border-bottom:0.5px solid var(--border2);background:var(--surface2);text-transform:uppercase;letter-spacing:.03em;}
th.cp{text-align:left;width:130px;}th.co{width:82px;}
td{padding:5px;border-bottom:0.5px solid var(--border);vertical-align:top;}
tr:last-child td{border-bottom:none;}
.pcell{vertical-align:middle;}
.prow{display:flex;align-items:center;gap:7px;}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;}
.pname{font-size:11px;font-weight:500;color:var(--t1);}
.prole{font-size:10px;color:var(--t2);}
.dc{cursor:pointer;min-height:44px;border-radius:var(--rs);padding:3px;transition:background .1s;}
.dc:hover{background:var(--surface2);}
.dc.warn{background:rgba(251,191,36,.08);outline:0.5px solid rgba(251,191,36,.35);}
.dc.danger{background:rgba(220,38,38,.07);outline:0.5px solid rgba(220,38,38,.3);}
.pill{display:flex;align-items:center;gap:3px;padding:2px 5px;border-radius:4px;margin-bottom:2px;font-size:10px;line-height:1.3;font-weight:500;}
.ph{flex-shrink:0;}.pn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.pic{display:flex;align-items:center;gap:2px;margin-left:2px;flex-shrink:0;}
.pl{opacity:0;cursor:pointer;font-size:10px;text-decoration:none;line-height:1;color:inherit;}
.pill:hover .pl{opacity:.7;}.pill:hover .pl:hover{opacity:1;}
.pdel{opacity:0;cursor:pointer;font-size:11px;color:inherit;background:none;border:none;padding:0;line-height:1;}
.pill:hover .pdel{opacity:1;}
.addlnk{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:2px;padding:2px;cursor:pointer;}
.addlnk:hover{color:var(--t2);}
.halert{font-size:10px;padding:2px 5px;border-radius:3px;margin-top:2px;display:inline-flex;align-items:center;gap:3px;font-weight:500;}
.halert.warn{background:rgba(251,191,36,.15);color:#d97706;}
.halert.danger{background:rgba(220,38,38,.12);color:#dc2626;}
[data-theme="dark"] .halert.warn{color:#fbbf24;}
[data-theme="dark"] .halert.danger{color:#f87171;}
.hok{font-size:10px;color:#16a34a;padding:2px;font-weight:500;}
[data-theme="dark"] .hok{color:#4ade80;}
.ddh{font-size:9px;color:var(--t3);display:block;text-align:center;font-weight:400;text-transform:none;letter-spacing:0;}
.occw{display:flex;flex-direction:column;align-items:flex-end;gap:3px;padding:3px 2px;}
.occbar{width:54px;height:4px;background:var(--border2);border-radius:99px;overflow:hidden;}
.occf{height:100%;border-radius:99px;}
.occpct{font-size:11px;font-weight:500;}
.occsub{font-size:10px;color:var(--t3);}
.legwrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:12px;align-items:center;}
.legp{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;margin-top:4px;}
.pcard{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r);padding:14px;}
.pcname{font-size:13px;font-weight:500;color:var(--t1);}
.pccode{font-size:10px;color:var(--t2);font-family:var(--mono);background:var(--surface2);padding:1px 6px;border-radius:4px;border:0.5px solid var(--border);letter-spacing:.05em;}
.pclinks{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap;}
.pclink{font-size:10px;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;text-decoration:none;border:0.5px solid var(--border2);color:var(--t2);font-weight:500;}
.pclink:hover{border-color:var(--t1);color:var(--t1);}
.pclgh{font-size:10px;color:var(--t3);background:none;border:0.5px dashed var(--border2);border-radius:20px;padding:2px 8px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;}
.pclgh:hover{border-color:var(--t2);color:var(--t2);}
.sbadge{font-size:10px;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;font-weight:500;}
.progrow{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.progbar{flex:1;height:5px;background:var(--border2);border-radius:99px;overflow:hidden;}
.progf{height:100%;border-radius:99px;}
.progpct{font-size:11px;font-weight:500;min-width:32px;text-align:right;}
.delrow{display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
.dctrl{display:flex;align-items:center;gap:2px;}
.dbtn{width:20px;height:20px;border-radius:50%;border:0.5px solid var(--border2);background:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--t1);}
.dbtn:hover{background:var(--surface2);}
.dcnt{font-size:11px;font-weight:500;min-width:42px;text-align:center;font-family:var(--mono);}
.dlbl{font-size:10px;color:var(--t2);}
.qsec{border-top:0.5px solid var(--border);padding-top:8px;margin:4px 0 8px;}
.qtitle{font-size:10px;font-weight:500;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
.qrow{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.qrole{font-size:10px;color:var(--t2);width:82px;flex-shrink:0;}
.qbarw{flex:1;display:flex;align-items:center;gap:5px;}
.qbar{flex:1;height:3px;background:var(--border2);border-radius:99px;overflow:hidden;}
.qf{height:100%;border-radius:99px;}
.qnums{font-size:10px;font-family:var(--mono);white-space:nowrap;font-weight:500;}
.pcfoot{display:flex;align-items:center;justify-content:space-between;border-top:0.5px solid var(--border);padding-top:6px;margin-top:4px;}
.gbtn{font-size:10px;color:var(--t3);background:none;border:none;cursor:pointer;padding:2px 4px;display:inline-flex;align-items:center;gap:3px;}
.gbtn:hover{color:#dc2626;}
.gbtn.edit:hover{color:var(--t1);}
.addcard{background:var(--surface);border:0.5px dashed var(--border2);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;min-height:110px;}
.addcard:hover{background:var(--surface2);}
.addcard span{font-size:11px;color:var(--t2);font-weight:500;}
.psec{margin-bottom:14px;}
.pseclbl{font-size:10px;font-weight:500;padding:2px 9px;border-radius:20px;display:inline-block;margin-bottom:8px;}
.ppgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;}
.ppcard{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r);padding:12px;display:flex;align-items:center;gap:10px;}
.ppinfo{flex:1;}
.ppname{font-size:12px;font-weight:500;color:var(--t1);}
.ppmeta{display:flex;align-items:center;gap:4px;margin-top:2px;flex-wrap:wrap;}
.pprt{font-size:10px;color:var(--t2);}
.lbadge{font-size:10px;padding:1px 6px;border-radius:20px;font-weight:500;}
.ppdel{background:none;border:none;cursor:pointer;color:var(--t3);font-size:16px;padding:2px;line-height:1;}
.ppdel:hover{color:#dc2626;}
.movl{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r);padding:20px;width:320px;max-width:95%;max-height:88vh;overflow-y:auto;}
.modal h3{font-size:14px;font-weight:500;margin-bottom:3px;color:var(--t1);}
.msub{font-size:11px;color:var(--t2);margin-bottom:12px;}
.field{margin-bottom:9px;}
.field label{font-size:10px;font-weight:500;color:var(--t2);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.field input,.field select{width:100%;font-size:12px;border:0.5px solid var(--border2);border-radius:var(--rs);padding:6px 9px;background:var(--surface2);color:var(--t1);outline:none;}
.field input:focus,.field select:focus{border-color:var(--t1);}
.field input.mono{font-family:var(--mono);letter-spacing:.05em;}
.sdiv{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 7px;padding-top:9px;border-top:0.5px solid var(--border);}
.qir{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.qir label{margin:0;width:86px;flex-shrink:0;font-size:10px;color:var(--t2);}
.qir input{flex:1;font-size:11px;font-family:var(--mono);}
.qir span{font-size:10px;color:var(--t3);}
.mbtns{display:flex;gap:6px;justify-content:flex-end;margin-top:14px;}
.err{font-size:11px;color:#dc2626;margin-top:4px;font-weight:500;}
.onote{font-size:11px;color:#d97706;background:rgba(251,191,36,.1);padding:5px 8px;border-radius:4px;margin-top:4px;display:none;}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="logo"><div class="logo-dot"></div>Tablero de Equipo</div>
    <div class="header-right">
      <div class="sst" id="sst"><i class="ti ti-check"></i> Listo</div>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">
        <i class="ti ti-moon" id="theme-icon"></i>
        <span id="theme-label">Modo claro</span>
      </button>
    </div>
  </div>
  <div class="nav">
    <button class="nb active" id="nb-cal" onclick="switchTab('cal')"><i class="ti ti-calendar-week"></i> Semana</button>
    <button class="nb" id="nb-proj" onclick="switchTab('proj')"><i class="ti ti-chart-bar"></i> Proyectos</button>
    <button class="nb" id="nb-people" onclick="switchTab('people')"><i class="ti ti-users"></i> Equipo</button>
  </div>
  <div id="view-cal" class="view active"></div>
  <div id="view-proj" class="view"></div>
  <div id="view-people" class="view"></div>
</div>
<script>
// ── THEME ──
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('theme-icon').className=isDark?'ti ti-sun':'ti ti-moon';
  document.getElementById('theme-label').textContent=isDark?'Modo oscuro':'Modo claro';
  localStorage.setItem('tb_theme',isDark?'light':'dark');
}
(function(){
  const t=localStorage.getItem('tb_theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.addEventListener('DOMContentLoaded',function(){
    const icon=document.getElementById('theme-icon');
    const lbl=document.getElementById('theme-label');
    if(icon)icon.className=t==='dark'?'ti ti-moon':'ti ti-sun';
    if(lbl)lbl.textContent=t==='dark'?'Modo claro':'Modo oscuro';
  });
})();

// ── DATA ──
const DAYS=['Lun','Mar','Mié','Jue','Vie'];
const TT_DARK=[
  {id:'ejecucion',   label:'Ejecución',     bg:'#1e3a5f',fg:'#93c5fd'},
  {id:'reunion',     label:'Reunión',        bg:'#3b2a0e',fg:'#fcd34d'},
  {id:'igloo',       label:'Reunión Igloo',  bg:'#2d1f4e',fg:'#c4b5fd'},
  {id:'cliente',     label:'Cliente',        bg:'#3b1a0c',fg:'#fdba74'},
  {id:'revision',    label:'Revisión',       bg:'#3b1224',fg:'#f9a8d4'},
  {id:'entrega',     label:'Entrega',        bg:'#0d2e1e',fg:'#6ee7b7'},
  {id:'capacitacion',label:'Capacitación',   bg:'#2d1a08',fg:'#fde68a'},
  {id:'admin',       label:'Administrativo', bg:'#1e1e1c',fg:'#d1d5db'},
  {id:'permiso',     label:'Permiso',        bg:'#3b0f2a',fg:'#f0abfc'},
  {id:'vacaciones',  label:'Vacaciones',     bg:'#142b0d',fg:'#86efac'},
  {id:'libre',       label:'Libre',          bg:'#2a2a28',fg:'#9ca3af'},
];
const TT_LIGHT=[
  {id:'ejecucion',   label:'Ejecución',     bg:'#E6F1FB',fg:'#0C447C'},
  {id:'reunion',     label:'Reunión',        bg:'#FAEEDA',fg:'#633806'},
  {id:'igloo',       label:'Reunión Igloo',  bg:'#F1EAF8',fg:'#5B2D8E'},
  {id:'cliente',     label:'Cliente',        bg:'#FAECE7',fg:'#712B13'},
  {id:'revision',    label:'Revisión',       bg:'#FBEAF0',fg:'#72243E'},
  {id:'entrega',     label:'Entrega',        bg:'#E1F5EE',fg:'#085041'},
  {id:'capacitacion',label:'Capacitación',   bg:'#FEF3E2',fg:'#7A4100'},
  {id:'admin',       label:'Administrativo', bg:'#F1EFE8',fg:'#444441'},
  {id:'permiso',     label:'Permiso',        bg:'#FDE8F0',fg:'#8C1A4B'},
  {id:'vacaciones',  label:'Vacaciones',     bg:'#EAF3DE',fg:'#27500A'},
  {id:'libre',       label:'Libre',          bg:'#EFEFEF',fg:'#666663'},
];
function getTT(){return document.documentElement.getAttribute('data-theme')==='dark'?TT_DARK:TT_LIGHT;}
function getTM(){return Object.fromEntries(getTT().map(t=>[t.id,t]));}

const NP=['vacaciones','permiso','libre','admin','capacitacion','igloo','reunion'];
const ROLES=['Manager','Copy','Diseño','Motion','Industrial','Estrategia','Otro'];

const LT_DARK=[
  {id:'fijo',   label:'Fijo',              bg:'#0d2e1e',fg:'#6ee7b7'},
  {id:'apoyo',  label:'Apoyo puntual',     bg:'#3b2a0e',fg:'#fcd34d'},
  {id:'externo',label:'Externo/Freelance', bg:'#2d1f4e',fg:'#c4b5fd'},
];
const LT_LIGHT=[
  {id:'fijo',   label:'Fijo',              bg:'#E1F5EE',fg:'#085041'},
  {id:'apoyo',  label:'Apoyo puntual',     bg:'#FAEEDA',fg:'#633806'},
  {id:'externo',label:'Externo/Freelance', bg:'#EEEDFE',fg:'#3C3489'},
];
function getLT(){return document.documentElement.getAttribute('data-theme')==='dark'?LT_DARK:LT_LIGHT;}
function getLM(){return Object.fromEntries(getLT().map(l=>[l.id,l]));}

const AVC_DARK=[['#2d1f4e','#c4b5fd'],['#1e3a5f','#93c5fd'],['#0d2e1e','#6ee7b7'],['#3b2a0e','#fcd34d'],['#3b1224','#f9a8d4'],['#3b1a0c','#fdba74'],['#2d1a08','#fde68a']];
const AVC_LIGHT=[['#EEEDFE','#3C3489'],['#E6F1FB','#0C447C'],['#E1F5EE','#085041'],['#FAEEDA','#633806'],['#FBEAF0','#72243E'],['#FAECE7','#712B13'],['#F1EAF8','#5B2D8E']];
function getAVC(){return document.documentElement.getAttribute('data-theme')==='dark'?AVC_DARK:AVC_LIGHT;}

function getRFG(){return document.documentElement.getAttribute('data-theme')==='dark'?['#d1d5db','#93c5fd','#c4b5fd','#6ee7b7','#fcd34d','#fdba74','#f9a8d4']:['#444441','#0C447C','#3C3489','#085041','#633806','#712B13','#72243E'];}
function getRBG(){return document.documentElement.getAttribute('data-theme')==='dark'?['#1e1e1c','#1e3a5f','#2d1f4e','#0d2e1e','#3b2a0e','#3b1a0c','#3b1224']:['#F1EFE8','#E6F1FB','#EEEDFE','#E1F5EE','#FAEEDA','#FAECE7','#FBEAF0'];}

function defS(){
  return{weekOffset:0,
    people:[{id:'p1',name:'Ana García',role:'Copy',link:'fijo'},{id:'p2',name:'Luis Mora',role:'Diseño',link:'fijo'}],
    projects:[
      {id:'pr1',name:'Bancolombia',done:3,total:8,deadline:'2026-06-15',basecampUrl:'',projectUrl:'',code:'BC2026001',quota:{Manager:5,Copy:20,'Diseño':30,Motion:0,Industrial:0,Estrategia:0,Otro:0}},
      {id:'pr2',name:'Éxito',done:1,total:5,deadline:'2026-05-30',basecampUrl:'',projectUrl:'',code:'EX2026002',quota:{Manager:4,Copy:10,'Diseño':15,Motion:8,Industrial:0,Estrategia:0,Otro:5}},
      {id:'pr3',name:'Postobón',done:5,total:6,deadline:'2026-06-30',basecampUrl:'',projectUrl:'',code:'PB2026003',quota:{Manager:3,Copy:8,'Diseño':24,Motion:12,Industrial:0,Estrategia:6,Otro:0}},
    ],
    entries:{}};
}
function loadS(){try{const s=localStorage.getItem('tb_v3');if(s){const p=JSON.parse(s);p.modal=null;return p;}}catch(e){}return Object.assign(defS(),{modal:null});}
function saveS(){try{const c=Object.assign({},S);delete c.modal;localStorage.setItem('tb_v3',JSON.stringify(c));showSaved();}catch(e){}}
function showSaved(){const el=document.getElementById('sst');if(!el)return;el.innerHTML='<i class="ti ti-check"></i> Guardado';setTimeout(()=>{el.innerHTML='<i class="ti ti-clock"></i> Auto-guardado';},2000);}

let S=loadS();

function uid(){return 'x'+Math.random().toString(36).slice(2);}
function ini(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function avs(i){const avc=getAVC();const[bg,fg]=avc[i%avc.length];return 'background:'+bg+';color:'+fg;}
function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
function oc(p){return p>=90?(isDark()?'#f87171':'#dc2626'):p>=70?(isDark()?'#fbbf24':'#d97706'):(isDark()?'#4ade80':'#16a34a');}
function prc(p){return p>=80?(isDark()?'#4ade80':'#16a34a'):p>=40?(isDark()?'#fbbf24':'#d97706'):(isDark()?'#60a5fa':'#2563eb');}
function wdates(off){const now=new Date();const day=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1)+off*7);return Array.from({length:5},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}
function wlbl(off){const dd=wdates(off);const fmt=d=>d.toLocaleDateString('es-CO',{day:'numeric',month:'short'});return fmt(dd[0])+' – '+fmt(dd[4]);}
function ekey(pid,wo,di){return pid+'_w'+wo+'_d'+di;}
function getE(pid,di){return S.entries[ekey(pid,S.weekOffset,di)]||[];}
function setE(pid,di,arr){S.entries[ekey(pid,S.weekOffset,di)]=arr;saveS();}
function hday(pid,di){return getE(pid,di).reduce((s,e)=>s+e.hours,0);}
function hweek(pid){return DAYS.reduce((s,_,i)=>s+hday(pid,i),0);}
function wocc(pid){return Math.round((hweek(pid)/40)*100);}
function dleft(dl){if(!dl)return null;return Math.ceil((new Date(dl+'T12:00:00')-new Date())/(864e5));}
function dlabel(dl){
  const warn=isDark()?'#f87171':'#dc2626';const amber=isDark()?'#fbbf24':'#d97706';
  if(dl===null)return '';
  if(dl<0)return '<span style="color:'+warn+';font-size:10px">⚠ Vencido hace '+Math.abs(dl)+'d</span>';
  if(dl===0)return '<span style="color:'+warn+';font-size:10px">Vence hoy</span>';
  if(dl<=7)return '<span style="color:'+amber+';font-size:10px">Vence en '+dl+'d</span>';
  return '<span style="color:var(--t3);font-size:10px">Vence en '+dl+'d</span>';
}
function mkov(){const o=document.createElement('div');o.className='movl';return o;}
function closeModal(){S.modal=null;document.querySelectorAll('.movl').forEach(e=>e.remove());}

function switchTab(t){
  S.tab=t;
  ['cal','proj','people'].forEach(id=>{
    document.getElementById('nb-'+id).classList.toggle('active',id===t);
    document.getElementById('view-'+id).classList.toggle('active',id===t);
  });
  if(t==='cal')renderCal();
  else if(t==='proj')renderProj();
  else renderPeople();
}

// ── CALENDAR ──
function renderCal(){
  const el=document.getElementById('view-cal');
  const dates=wdates(S.weekOffset);
  const pp=S.people;
  const th=pp.length*40,uh=pp.reduce((s,p)=>s+hweek(p.id),0);
  const go=th>0?Math.round((uh/th)*100):0;
  const ov=pp.filter(p=>wocc(p.id)>=90).length;
  const fr=pp.filter(p=>wocc(p.id)<70).length;
  let h='<div class="tbar"><div class="wnav"><button onclick="chW(-1)">&#8592;</button><span class="wlbl">'+wlbl(S.weekOffset)+'</span><button onclick="chW(1)">&#8594;</button></div></div>'
    +'<div class="srow">'
    +'<div class="sc"><div class="slbl">Personas</div><div class="sval">'+pp.length+'</div></div>'
    +'<div class="sc"><div class="slbl">Ocupación</div><div class="sval" style="color:'+oc(go)+'">'+go+'%</div></div>'
    +'<div class="sc"><div class="slbl">Con capacidad</div><div class="sval" style="color:'+oc(0)+'">'+fr+'</div></div>'
    +'<div class="sc"><div class="slbl">Sobrecargados</div><div class="sval" style="color:'+(ov>0?oc(100):'var(--t2)')+'">'+ov+'</div></div>'
    +'</div>'
    +'<div class="gwrap"><table><thead><tr><th class="cp">Persona</th>'
    +DAYS.map((d,i)=>'<th>'+d+'<span class="ddh">'+dates[i].getDate()+'/'+(dates[i].getMonth()+1)+'</span></th>').join('')
    +'<th class="co">Semana</th></tr></thead><tbody>';
  for(let pi=0;pi<pp.length;pi++){
    const p=pp[pi];
    const lm=getLM();const lnkd=p.link&&p.link!=='fijo'&&lm[p.link]?' · <span style="color:'+lm[p.link].fg+';font-size:9px">'+lm[p.link].label+'</span>':'';
    h+='<tr><td class="pcell"><div class="prow"><div class="av" style="'+avs(pi)+'">'+ini(p.name)+'</div><div><div class="pname">'+p.name+'</div><div class="prole">'+p.role+lnkd+'</div></div></div></td>';
    for(let di=0;di<5;di++){
      const entries=getE(p.id,di),used=hday(p.id,di);
      const cls=used>10?' danger':used>8?' warn':'';
      h+='<td><div class="dc'+cls+'" onclick="openEM(\''+p.id+'\','+di+')">';
      const tm=getTM();
      entries.forEach((e,ei)=>{
        const t=tm[e.type]||{bg:'#1e1e1c',fg:'#9ca3af'};
        const sT=e.project&&!NP.includes(e.type);
        const trl=sT?'<a class="pl" '+(e.trelloUrl?'href="'+e.trelloUrl+'" target="_blank" onclick="event.stopPropagation()"':'href="#" onclick="openTrl(event,\''+p.id+'\','+di+','+ei+')"')+' title="'+(e.trelloUrl?'Ver en Trello':'+ Trello')+'" style="color:'+t.fg+'"><i class="ti ti-brand-trello" style="font-size:10px"></i></a>':'';
        h+='<div class="pill" style="background:'+t.bg+'"><span class="ph" style="color:'+t.fg+'">'+e.hours+'h</span><span class="pn" style="color:'+t.fg+'">'+(NP.includes(e.type)?t.label:(e.project||t.label))+'</span><span class="pic">'+trl+'<button class="pdel" style="color:'+t.fg+'" onclick="delE(event,\''+p.id+'\','+di+','+ei+')">×</button></span></div>';
      });
      if(used>10)h+='<div class="halert danger">⛔ '+used+'h</div>';
      else if(used>8)h+='<div class="halert warn">⚠ '+used+'h extra</div>';
      else if(used===8)h+='<div class="hok">✓ 8h</div>';
      else h+='<div class="addlnk"><i class="ti ti-plus" style="font-size:9px"></i>'+(used>0?(8-used)+'h libres':'+ asignar')+'</div>';
      h+='</div></td>';
    }
    const wp=wocc(p.id);
    h+='<td><div class="occw"><span class="occpct" style="color:'+oc(wp)+'">'+wp+'%</span><div class="occbar"><div class="occf" style="width:'+Math.min(wp,100)+'%;background:'+oc(wp)+'"></div></div><span class="occsub">'+hweek(p.id)+'/40h</span></div></td></tr>';
  }
  h+='</tbody></table></div><div class="legwrap">'+getTT().map(t=>'<span class="legp" style="background:'+t.bg+';color:'+t.fg+'">'+t.label+'</span>').join('')+'</div>';
  el.innerHTML=h;
  if(S.modal&&S.modal.type==='entry')renderEM();
  if(S.modal&&S.modal.type==='trello')renderTM();
}

// ── PROJECTS ──
function renderProj(){
  const el=document.getElementById('view-proj');
  const tot=S.projects.length;
  const pct=tot>0?Math.round(S.projects.reduce((s,p)=>s+(p.total>0?p.done/p.total:0),0)/tot*100):0;
  const ot=S.projects.filter(p=>{const dl=dleft(p.deadline);return dl===null||dl>=0;}).length;
  let h='<div class="tbar"><span class="ptitle">Proyectos activos</span><button class="btn" onclick="openAP()"><i class="ti ti-plus"></i> Nuevo</button></div>'
    +'<div class="srow">'
    +'<div class="sc"><div class="slbl">Proyectos</div><div class="sval">'+tot+'</div></div>'
    +'<div class="sc"><div class="slbl">Avance promedio</div><div class="sval" style="color:'+prc(pct)+'">'+pct+'%</div></div>'
    +'<div class="sc"><div class="slbl">A tiempo</div><div class="sval" style="color:'+oc(0)+'">'+ot+'</div></div>'
    +'</div><div class="pgrid">';
  const rfg=getRFG();const rbg=getRBG();
  S.projects.forEach(p=>{
    const pp=p.total>0?Math.round((p.done/p.total)*100):0;
    const dl=dleft(p.deadline);
    const dlf=p.deadline?new Date(p.deadline+'T12:00:00').toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric'}):'';
    let sb,sf;
    if(pp>=100){sb=isDark()?'#0d2e1e':'#EAF3DE';sf=isDark()?'#6ee7b7':'#27500A';}
    else if(dl!==null&&dl<0){sb=isDark()?'#3b0a0a':'#FCEBEB';sf=isDark()?'#fca5a5':'#A32D2D';}
    else if(dl!==null&&dl<=7){sb=isDark()?'#3b2a0e':'#FAEEDA';sf=isDark()?'#fcd34d':'#633806';}
    else{sb=isDark()?'#1e3a5f':'#E6F1FB';sf=isDark()?'#93c5fd':'#0C447C';}
    const st=pp>=100?'Completado':dl!==null&&dl<0?'Vencido':dl!==null&&dl<=7?'Urgente':'En curso';
    const tq=ROLES.reduce((s,r)=>s+(p.quota[r]||0),0);
    const bcl=p.basecampUrl?'<a class="pclink" href="'+p.basecampUrl+'" target="_blank"><i class="ti ti-brand-basecamp"></i> Basecamp</a>':'<button class="pclgh" onclick="openEP(\''+p.id+'\')"><i class="ti ti-plus"></i> Basecamp</button>';
    const genl=p.projectUrl?'<a class="pclink" href="'+p.projectUrl+'" target="_blank"><i class="ti ti-external-link"></i> Enlace</a>':'<button class="pclgh" onclick="openEP(\''+p.id+'\')"><i class="ti ti-plus"></i> Enlace</button>';
    const qrows=tq>0?('<div class="qsec"><div class="qtitle">Horas cotizadas por rol</div>'+ROLES.filter(r=>(p.quota[r]||0)>0).map(r=>{const q=p.quota[r]||0;const fi=ROLES.indexOf(r);return '<div class="qrow"><span class="qrole">'+r+'</span><div class="qbarw"><div class="qbar"><div class="qf" style="width:100%;background:'+rbg[fi]+'"></div></div><span class="qnums" style="color:'+rfg[fi]+'">'+q+'h</span></div></div>';}).join('')+'</div>'):'';
    h+='<div class="pcard">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:6px">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px"><span class="pcname">'+p.name+'</span>'+(p.code?'<span class="pccode">'+p.code+'</span>':'')+'</div>'
      +'<div class="pclinks">'+bcl+genl+(dlf?'<span style="font-size:10px;color:var(--t3)"><i class="ti ti-calendar" style="font-size:10px"></i> '+dlf+'</span>':'')+'</div>'
      +'</div>'
      +'<span class="sbadge" style="background:'+sb+';color:'+sf+'">'+st+'</span>'
      +'</div>'
      +'<div class="progrow"><div class="progbar"><div class="progf" style="width:'+pp+'%;background:'+prc(pp)+'"></div></div><span class="progpct" style="color:'+prc(pp)+'">'+pp+'%</span></div>'
      +'<div class="delrow"><span class="dlbl">Entregables:</span>'
      +'<div class="dctrl"><button class="dbtn" onclick="chD(\''+p.id+'\',-1,\'done\')">−</button><span class="dcnt">'+p.done+'/'+p.total+'</span><button class="dbtn" onclick="chD(\''+p.id+'\',1,\'done\')">+</button></div>'
      +'<span class="dlbl">· Total:</span>'
      +'<div class="dctrl"><button class="dbtn" onclick="chD(\''+p.id+'\',-1,\'total\')">−</button><span class="dcnt" style="min-width:24px">'+p.total+'</span><button class="dbtn" onclick="chD(\''+p.id+'\',1,\'total\')">+</button></div>'
      +'</div>'
      +qrows
      +'<div class="pcfoot">'+dlabel(dl)+'<div style="display:flex;gap:4px"><button class="gbtn edit" onclick="openEP(\''+p.id+'\')"><i class="ti ti-edit" style="font-size:10px"></i> Editar</button><button class="gbtn" onclick="delP(\''+p.id+'\')"><i class="ti ti-trash" style="font-size:10px"></i> Eliminar</button></div></div>'
      +'</div>';
  });
  h+='<div class="addcard" onclick="openAP()"><i class="ti ti-plus" style="font-size:20px;color:var(--t3)"></i><span>Nuevo proyecto</span></div></div>';
  el.innerHTML=h;
  if(S.modal&&(S.modal.type==='addProj'||S.modal.type==='editProj'))renderPM();
}

  el.innerHTML=h;
  if(S.modal&&S.modal.type==='addPerson')renderQM();

// ── MODALS ──
function renderEM(){
  const{pid,dayIdx}=S.modal;
  const p=S.people.find(x=>x.id===pid);
  const dates=wdates(S.weekOffset);const d=dates[dayIdx];const used=hday(pid,dayIdx);
  const warnC=isDark()?'#f87171':'#dc2626';const amberC=isDark()?'#fbbf24':'#d97706';
  const sub=used>=8?'· <span style="color:'+(used>10?warnC:amberC)+'">'+(used>10?'más de 10h':'supera la jornada')+'</span>':'· quedan '+(8-used)+'h';
  const ov=mkov();
  ov.innerHTML='<div class="modal"><h3>'+p.name+' — '+DAYS[dayIdx]+' '+d.getDate()+'/'+(d.getMonth()+1)+'</h3><div class="msub">'+used+'h asignadas '+sub+'</div>'
    +'<div class="field"><label>Tipo de tarea</label><select id="m-type" onchange="togP(this.value)">'+getTT().map(t=>'<option value="'+t.id+'">'+t.label+'</option>').join('')+'</select></div>'
    +'<div id="pf" class="field"><label>Proyecto</label><select id="m-proj"><option value="">— sin proyecto —</option>'+S.projects.map(pr=>'<option value="'+pr.name+'">'+pr.name+'</option>').join('')+'</select></div>'
    +'<div class="field"><label>Horas</label><input type="number" id="m-hours" min="0.5" max="16" step="0.5" value="'+Math.max(0.5,Math.min(4,8-used)||1)+'"></div>'
    +'<div class="onote" id="mnote">⚠ Superarás las 8h — se registrará como horas extra.</div>'
    +'<div id="tf" class="field"><label><i class="ti ti-brand-trello" style="font-size:10px"></i> Enlace Trello (opcional)</label><input type="url" id="m-trello" placeholder="https://trello.com/c/..."></div>'
    +'<div id="merr" class="err"></div>'
    +'<div class="mbtns"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-ok" onclick="saveE()">Agregar</button></div></div>';
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});document.body.appendChild(ov);
  togP('ejecucion');
  setTimeout(()=>{const hi=document.getElementById('m-hours');if(hi)hi.addEventListener('input',()=>{const n=document.getElementById('mnote');if(n)n.style.display=(used+parseFloat(hi.value||0))>8?'block':'none';});},50);

function togP(v){const pf=document.getElementById('pf');const tf=document.getElementById('tf');if(pf)pf.style.display=NP.includes(v)?'none':'block';if(tf)tf.style.display=NP.includes(v)?'none':'block';}

  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});document.body.appendChild(ov);
}

function renderQM(){

// ── ACTIONS ──
function chW(d){S.weekOffset+=d;saveS();renderCal();}
function openEM(pid,di){S.modal={type:'entry',pid,dayIdx:di};renderCal();}
function openTrl(evt,pid,di,ei){evt.preventDefault();evt.stopPropagation();S.modal={type:'trello',pid,dayIdx:di,ei};renderCal();}
function saveTrl(){const url=document.getElementById('trl-url').value.trim();const{pid,dayIdx,ei}=S.modal;const arr=getE(pid,dayIdx);if(arr[ei])arr[ei].trelloUrl=url;setE(pid,dayIdx,arr);closeModal();renderCal();}
function saveE(){
  const type=document.getElementById('m-type').value;
  const proj=NP.includes(type)?'':(document.getElementById('m-proj')?document.getElementById('m-proj').value:'');
  const hours=parseFloat(document.getElementById('m-hours').value)||1;
  const trelloUrl=document.getElementById('m-trello')?document.getElementById('m-trello').value.trim():'';
  const{pid,dayIdx}=S.modal;
  const arr=getE(pid,dayIdx);arr.push({project:proj,type,hours,trelloUrl});
  setE(pid,dayIdx,arr);closeModal();renderCal();
}
function delE(evt,pid,di,ei){evt.stopPropagation();const arr=getE(pid,di);arr.splice(ei,1);setE(pid,di,arr);renderCal();}
function openAP(){S.modal={type:'addProj'};renderProj();}
function openEP(id){S.modal={type:'editProj',pid:id};renderProj();}
function savePr(){
  const name=document.getElementById('ap-n').value.trim();if(!name){document.getElementById('aperr').textContent='Escribe el nombre.';return;}
  const quota=Object.fromEntries(ROLES.map(r=>[r,parseInt(document.getElementById('q-'+r).value)||0]));
  S.projects.push({id:uid(),name,code:document.getElementById('ap-c').value.trim().slice(0,10),done:0,total:parseInt(document.getElementById('ap-t').value)||1,deadline:document.getElementById('ap-d').value,basecampUrl:document.getElementById('ap-bc').value.trim(),projectUrl:document.getElementById('ap-u').value.trim(),quota});
  saveS();closeModal();renderProj();
}
function saveEP(id){
  const p=S.projects.find(x=>x.id===id);if(!p)return;
  p.name=document.getElementById('ap-n').value.trim()||p.name;
  p.code=document.getElementById('ap-c').value.trim().slice(0,10);
  p.total=parseInt(document.getElementById('ap-t').value)||p.total;
  p.deadline=document.getElementById('ap-d').value;
  p.basecampUrl=document.getElementById('ap-bc').value.trim();
  p.projectUrl=document.getElementById('ap-u').value.trim();
  ROLES.forEach(r=>{p.quota[r]=parseInt(document.getElementById('q-'+r).value)||0;});
  if(p.done>p.total)p.done=p.total;
  saveS();closeModal();renderProj();
}
function delP(id){S.projects=S.projects.filter(p=>p.id!==id);saveS();renderProj();}
function chD(id,delta,field){
  const p=S.projects.find(x=>x.id===id);if(!p)return;
  if(field==='done')p.done=Math.max(0,Math.min(p.total,p.done+delta));
  if(field==='total'){p.total=Math.max(1,p.total+delta);if(p.done>p.total)p.done=p.total;}
  saveS();renderProj();
}
function openAQ(){S.modal={type:'addPerson'};renderPeople();}
function saveQ(){
  const name=document.getElementById('pp-n').value.trim();if(!name)return;
  S.people.push({id:uid(),name,role:document.getElementById('pp-r').value,link:document.getElementById('pp-l').value});
  saveS();closeModal();renderPeople();
}
function delPerson(id){S.people=S.people.filter(p=>p.id!==id);saveS();renderPeople();}

renderCal();
</script>
